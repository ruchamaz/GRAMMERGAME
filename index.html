<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Grammar Galaxy</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg1: #f0f4ff;
  --bg2: #e8eeff;
  --bg3: #dde6ff;
  --accent: #e94560;
  --gold: #e08a00;
  --mint: #0a9e7a;
  --mint-light: #e0f7f1;
  --lavender: #6d56d8;
  --lav-light: #eeeaff;
  --card-bg: #ffffff;
  --card-border: #d0d8f0;
  --text: #1e1e3a;
  --muted: #6b7280;
  --shadow: rgba(100,120,200,0.13);
}

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #f0f4ff 0%, #e8eeff 55%, #dde6ff 100%);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
  font-family: 'Nunito', sans-serif;
}

#gapp {
  width: 100%;
  max-width: 680px;
  background: linear-gradient(160deg, #f0f4ff 0%, #e8eeff 55%, #dde6ff 100%);
  border-radius: 24px;
  overflow: hidden;
  position: relative;
  color: var(--text);
  box-shadow: 0 8px 40px rgba(100,120,200,0.18);
}

.stars { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.star {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, #a0b4f0, #c8d4ff);
  animation: twinkle linear infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0.18; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.5); }
}

.orb { position: absolute; border-radius: 50%; filter: blur(55px); pointer-events: none; z-index: 0; }
.orb1 { width: 260px; height: 260px; background: rgba(167,139,250,0.22); top: -80px; right: -60px; }
.orb2 { width: 200px; height: 200px; background: rgba(15,180,140,0.14); bottom: -40px; left: -60px; }
.orb3 { width: 160px; height: 160px; background: rgba(233,69,96,0.10); top: 45%; left: 28%; }

.content { position: relative; z-index: 1; }

.screen { display: none; padding: 1.6rem 1.4rem; animation: fadeIn 0.4s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

/* INTRO */
#screen-intro { text-align: center; padding: 2.2rem 1.4rem; }

.game-logo {
  font-family: 'Baloo 2', cursive;
  font-size: 2.5rem; font-weight: 800;
  background: linear-gradient(135deg, #6d56d8, #e94560, #e08a00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1; margin-bottom: 0.2rem;
}

.game-sub { font-size: 0.9rem; color: var(--muted); direction: rtl; margin-bottom: 2rem; font-weight: 600; }

.planet-row { display: flex; justify-content: center; gap: 1rem; margin: 1.5rem 0 0.5rem; flex-wrap: wrap; }

.planet {
  width: 74px; height: 74px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; cursor: pointer;
  border: 2.5px solid transparent;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  position: relative;
  animation: float 3s ease-in-out infinite;
  box-shadow: 0 6px 18px rgba(100,120,200,0.15);
}
.planet:nth-child(2) { animation-delay: 0.5s; }
.planet:nth-child(3) { animation-delay: 1s; }
.planet:nth-child(4) { animation-delay: 1.5s; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.planet:hover { transform: scale(1.12) translateY(-4px) !important; box-shadow: 0 10px 28px rgba(100,120,200,0.28); }
.planet.selected { border-color: var(--lavender); box-shadow: 0 0 0 4px rgba(109,86,216,0.18); }

.planet-1 { background: radial-gradient(circle at 35% 35%, #ff9ab5, #e94560); }
.planet-2 { background: radial-gradient(circle at 35% 35%, #c4b5fd, #6d56d8); }
.planet-3 { background: radial-gradient(circle at 35% 35%, #6ee7b7, #0a9e7a); }
.planet-4 { background: radial-gradient(circle at 35% 35%, #fcd34d, #e08a00); }

.planet-label { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 800; color: var(--muted); white-space: nowrap; }

.level-desc {
  background: #fff; border: 1.5px solid var(--card-border);
  border-radius: 14px; padding: 0.9rem 1.2rem;
  font-size: 0.9rem; direction: rtl; color: var(--muted);
  margin: 2rem 0 1.5rem; min-height: 52px;
  font-weight: 600; box-shadow: 0 2px 10px var(--shadow);
}

.start-btn {
  padding: 14px 44px; border-radius: 32px; border: none;
  font-family: 'Baloo 2', cursive; font-size: 1.2rem; font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, #6d56d8, #e94560);
  color: #fff; transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(109,86,216,0.3);
}
.start-btn:hover { transform: scale(1.05); box-shadow: 0 6px 26px rgba(109,86,216,0.38); }
.start-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }

/* GAME */
#screen-game { padding: 1rem 1.2rem 1.4rem; }

.hud { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; gap: 8px; }

.hud-level {
  font-family: 'Baloo 2', cursive; font-size: 0.85rem; font-weight: 700;
  color: var(--lavender); background: var(--lav-light);
  padding: 5px 13px; border-radius: 20px; border: 1.5px solid #c4b5fd;
}

.hud-score {
  font-size: 0.85rem; font-weight: 800;
  color: var(--mint); background: var(--mint-light);
  padding: 5px 13px; border-radius: 20px; border: 1.5px solid #6ee7b7;
}

.hearts { display: flex; gap: 4px; }
.heart { font-size: 1.15rem; transition: transform 0.3s; }
.heart.lost { filter: grayscale(1); opacity: 0.3; transform: scale(0.75); }

.track-wrap {
  height: 10px; background: rgba(109,86,216,0.1);
  border-radius: 5px; margin-bottom: 1.2rem;
  overflow: visible; position: relative;
}
.track-fill {
  height: 100%; border-radius: 5px;
  background: linear-gradient(90deg, #6d56d8, #0a9e7a);
  transition: width 0.5s cubic-bezier(.4,0,.2,1); position: relative;
}
.rocket {
  position: absolute; right: -14px; top: 50%;
  transform: translateY(-50%); font-size: 1.1rem;
  transition: right 0.5s cubic-bezier(.4,0,.2,1);
  filter: drop-shadow(0 2px 6px rgba(109,86,216,0.35));
}

.q-card {
  border-radius: 18px; padding: 1.4rem 1.4rem 1.1rem;
  margin-bottom: 1rem; border: 1.5px solid var(--card-border);
  background: #ffffff; box-shadow: 0 4px 20px var(--shadow);
  position: relative; overflow: hidden;
}
.q-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 4px; border-radius: 18px 18px 0 0;
}
.q-card.type-ps::before { background: linear-gradient(90deg, #0a9e7a, #6ee7b7); }
.q-card.type-pp::before { background: linear-gradient(90deg, #e08a00, #f5a623); }

.q-type-tag {
  display: inline-block; font-size: 10px; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 4px 11px; border-radius: 8px; margin-bottom: 0.8rem;
}
.type-ps .q-type-tag { background: #e0f7f1; color: #0a9e7a; border: 1.5px solid #6ee7b7; }
.type-pp .q-type-tag { background: #fff7e0; color: #b06000; border: 1.5px solid #fcd34d; }

.q-en { font-size: 1.15rem; font-weight: 800; color: #1e1e3a; line-height: 1.6; margin-bottom: 0.6rem; }

.q-he {
  font-size: 0.85rem; color: #6b7280; font-weight: 700;
  direction: rtl; text-align: right;
  border-top: 1.5px dashed #e0e6ff;
  padding-top: 0.55rem; margin-top: 0.2rem; line-height: 1.6;
}

.opts { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 0.9rem; }

.opt {
  padding: 13px 14px; border-radius: 13px;
  border: 2px solid #d0d8f0; background: #f7f9ff;
  color: #1e1e3a; font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  text-align: left; display: flex; align-items: center; gap: 9px;
  transition: all 0.15s; box-shadow: 0 2px 8px rgba(100,120,200,0.07);
}
.opt:hover:not(:disabled) {
  background: var(--lav-light); border-color: var(--lavender);
  transform: translateY(-2px); box-shadow: 0 5px 16px rgba(109,86,216,0.15);
}
.opt-letter {
  width: 26px; height: 26px; border-radius: 50%;
  background: #e8eeff; color: #6d56d8;
  font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.15s, color 0.15s;
}
.opt.correct { background: #e0f7f1; border-color: #0a9e7a; color: #065f46; box-shadow: 0 4px 14px rgba(10,158,122,0.18); }
.opt.correct .opt-letter { background: #0a9e7a; color: #fff; }
.opt.wrong { background: #fff0f2; border-color: var(--accent); color: #9f1239; }
.opt.wrong .opt-letter { background: var(--accent); color: #fff; }

.fb-box {
  border-radius: 13px; padding: 12px 16px;
  font-size: 14px; font-weight: 700; line-height: 1.6; direction: rtl;
  display: none; margin-bottom: 0.9rem;
  animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
}
.fb-box.show { display: block; }
.fb-box.ok { background: #e0f7f1; color: #065f46; border-left: 4px solid #0a9e7a; }
.fb-box.err { background: #fff0f2; color: #9f1239; border-left: 4px solid var(--accent); }
@keyframes popIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }

.next-btn {
  display: none; width: 100%; padding: 13px;
  border-radius: 13px; border: none;
  font-family: 'Baloo 2', cursive; font-size: 1.05rem; font-weight: 700;
  cursor: pointer; color: #fff;
  background: linear-gradient(135deg, #6d56d8, #0a9e7a);
  transition: transform 0.12s, box-shadow 0.12s;
  box-shadow: 0 4px 18px rgba(109,86,216,0.25);
}
.next-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(109,86,216,0.32); }
.next-btn.show { display: block; }

.burst {
  position: fixed; width: 10px; height: 10px; border-radius: 50%;
  pointer-events: none; animation: burst 0.8s ease-out forwards; z-index: 999;
}
@keyframes burst {
  0% { opacity:1; transform: scale(1); }
  100% { opacity:0; transform: scale(0) translate(var(--tx), var(--ty)); }
}

.streak-badge {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  background: linear-gradient(135deg, #6d56d8, #e94560);
  color: #fff; font-family: 'Baloo 2', cursive;
  font-size: 1.3rem; font-weight: 800;
  padding: 14px 28px; border-radius: 16px;
  z-index: 999; pointer-events: none;
  animation: streakPop 1.4s ease forwards;
  box-shadow: 0 8px 32px rgba(109,86,216,0.4);
}
@keyframes streakPop {
  0% { transform: translate(-50%,-50%) scale(0); opacity:0; }
  20% { transform: translate(-50%,-50%) scale(1.1); opacity:1; }
  70% { transform: translate(-50%,-50%) scale(1); opacity:1; }
  100% { transform: translate(-50%,-50%) scale(0.8); opacity:0; }
}

/* END */
#screen-end { text-align: center; padding: 2rem 1.4rem; }

.end-planet { font-size: 5rem; animation: float 2s ease-in-out infinite; display: block; margin-bottom: 0.5rem; }

.end-title {
  font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800;
  background: linear-gradient(135deg, #6d56d8, #e94560);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 0.2rem;
}

.end-stars { font-size: 2rem; letter-spacing: 6px; margin: 0.4rem 0; }

.score-ring {
  width: 110px; height: 110px; border-radius: 50%;
  background: conic-gradient(#6d56d8 var(--pct), #e8eeff 0);
  display: flex; align-items: center; justify-content: center;
  margin: 1rem auto; position: relative;
  box-shadow: 0 4px 20px rgba(109,86,216,0.18);
}
.score-ring::before {
  content: ''; position: absolute; inset: 10px;
  border-radius: 50%; background: #fff;
}
.score-num {
  position: relative; z-index: 1;
  font-family: 'Baloo 2', cursive;
  font-size: 1.4rem; font-weight: 800; color: #6d56d8;
}

.end-msg { font-size: 1rem; color: var(--muted); direction: rtl; margin: 0.75rem 0 1.5rem; line-height: 1.6; font-weight: 600; }

.end-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

.end-btn {
  padding: 11px 28px; border-radius: 24px; border: none;
  font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: transform 0.12s;
}
.end-btn:hover { transform: scale(1.05); }
.btn-primary { background: linear-gradient(135deg, #6d56d8, #e94560); color: #fff; box-shadow: 0 4px 16px rgba(109,86,216,0.28); }
.btn-secondary { background: #f0f4ff; color: #6d56d8; border: 1.5px solid #c4b5fd; }
</style>
</head>
<body>

<div id="gapp">
  <div class="stars" id="stars-bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="content">

    <div class="screen active" id="screen-intro">
      <div class="game-logo">🚀 Grammar Galaxy</div>
      <div class="game-sub">משחק דקדוק אנגלי לכיתה ה׳ · Present Simple & Progressive</div>
      <div class="planet-row">
        <div class="planet planet-1" onclick="selectLevel(0)">🌸<span class="planet-label">קל</span></div>
        <div class="planet planet-2" onclick="selectLevel(1)">🪐<span class="planet-label">בינוני</span></div>
        <div class="planet planet-3" onclick="selectLevel(2)">🌍<span class="planet-label">מאתגר</span></div>
        <div class="planet planet-4" onclick="selectLevel(3)">⭐<span class="planet-label">מיקס</span></div>
      </div>
      <div class="level-desc" id="level-desc" dir="rtl">👆 בחר כוכב לחץ עליו ויצאנו להרפתקה!</div>
      <button class="start-btn" id="start-btn" disabled onclick="startGame()">יאללה, יוצאים! 🚀</button>
    </div>

    <div class="screen" id="screen-game">
      <div class="hud">
        <div class="hud-level" id="hud-level">Level</div>
        <div class="hearts" id="hearts">
          <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
        </div>
        <div class="hud-score" id="hud-score">⭐ 0 pts</div>
      </div>
      <div class="track-wrap">
        <div class="track-fill" id="track-fill" style="width:0%">
          <div class="rocket">🚀</div>
        </div>
      </div>
      <div class="q-card" id="q-card">
        <div class="q-type-tag" id="q-type-tag"></div>
        <div class="q-en" id="q-en"></div>
        <div class="q-he" id="q-he"></div>
      </div>
      <div class="opts" id="opts"></div>
      <div class="fb-box" id="fb"></div>
      <button class="next-btn" id="next-btn"></button>
    </div>

    <div class="screen" id="screen-end">
      <span class="end-planet" id="end-planet">🏆</span>
      <div class="end-title" id="end-title"></div>
      <div class="end-stars" id="end-stars"></div>
      <div class="score-ring" id="score-ring" style="--pct:0%">
        <div class="score-num" id="score-num"></div>
      </div>
      <div class="end-msg" id="end-msg"></div>
      <div class="end-btns">
        <button class="end-btn btn-primary" onclick="goIntro()">🌟 שחק שוב</button>
        <button class="end-btn btn-secondary" onclick="shareResult()">📊 שתף ציון</button>
      </div>
    </div>

  </div>
</div>

<script>
(function(){
  const c=document.getElementById('stars-bg');
  for(let i=0;i<50;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

const ALL_Q = [
  { type:'ps', hard:0, en:'She ___ to school every day.', he:'היא ___ לבית הספר כל יום.', opts:['go','goes','is going','are going'], ans:1, exp:'✅ she = גוף שלישי יחיד → מוסיפים -s: goes!' },
  { type:'ps', hard:0, en:'My dad ___ coffee every morning.', he:'אבא שלי ___ קפה כל בוקר.', opts:['drink','drinking','is drinking','drinks'], ans:3, exp:'✅ dad = גוף שלישי יחיד → drinks (עם -s)!' },
  { type:'ps', hard:0, en:'We ___ English at school.', he:'אנחנו ___ אנגלית בבית הספר.', opts:['studies','is studying','study','are studying'], ans:2, exp:'✅ We = גוף ראשון רבים → study (ללא -s)!' },
  { type:'ps', hard:0, en:'The sun ___ in the east.', he:'השמש ___ במזרח — עובדה קבועה!', opts:['rise','is rising','rises','are rising'], ans:2, exp:'✅ עובדות קבועות = Present Simple → rises!' },
  { type:'pp', hard:0, en:'Look! The cat ___ on the sofa.', he:'תסתכל! החתול ___ על הספה עכשיו.', opts:['sleep','sleeps','is sleeping','are sleeping'], ans:2, exp:'✅ "Look!" = עכשיו! → Present Progressive: is sleeping!' },
  { type:'pp', hard:0, en:'Right now, Tom and Lisa ___ their homework.', he:'עכשיו, טום וליסה ___ שיעורים.', opts:['do','does','is doing','are doing'], ans:3, exp:'✅ Tom and Lisa = רבים → are doing!' },
  { type:'pp', hard:0, en:'Shhh! The baby ___ now.', he:'שש! התינוק ___ עכשיו.', opts:['sleep','is sleeping','are sleeping','sleeps'], ans:1, exp:'✅ "Now" = הווה מתמשך → is sleeping!' },
  { type:'ps', hard:1, en:'My sister usually ___ TV after dinner.', he:'אחותי בדרך כלל ___ טלוויזיה אחרי ארוחת ערב.', opts:['watch','watches','is watching','are watching'], ans:1, exp:'✅ "Usually" = הרגל → Present Simple: watches!' },
  { type:'pp', hard:1, en:'They ___ to music at the moment.', he:'הם ___ למוזיקה כרגע.', opts:['listen','listens','are listening','is listening'], ans:2, exp:'✅ "At the moment" = עכשיו → are listening!' },
  { type:'ps', hard:1, en:'He never ___ vegetables. He hates them!', he:'הוא אף פעם לא ___ ירקות. הוא שונא אותם!', opts:['eat','eats','is eating','are eating'], ans:1, exp:'✅ "Never" = Present Simple → eats!' },
  { type:'pp', hard:1, en:'Why ___ you ___ so fast today?', he:'למה אתה ___ כל כך מהר היום?', opts:['do … run','does … run','are … running','is … running'], ans:2, exp:'✅ שאלה בהווה מתמשך → are you running?' },
  { type:'ps', hard:1, en:'Birds ___ south every winter.', he:'ציפורים ___ דרומה כל חורף.', opts:['fly','flies','are flying','is flying'], ans:0, exp:'✅ Birds (רבים) + הרגל שנתי → fly!' },
  { type:'pp', hard:2, en:'Listen! Someone ___ outside the door.', he:'תקשיב! מישהו ___ מחוץ לדלת.', opts:['knock','knocks','is knocking','are knocking'], ans:2, exp:'✅ "Listen!" = עכשיו → is knocking!' },
  { type:'ps', hard:2, en:'She ___ three languages fluently.', he:'היא ___ שלוש שפות בשטף.', opts:['speak','speaks','is speaking','are speaking'], ans:1, exp:'✅ יכולת קבועה = Present Simple → speaks!' },
  { type:'pp', hard:2, en:'The students ___ a test right now. Be quiet!', he:'התלמידים ___ מבחן עכשיו. היו שקטים!', opts:['take','takes','are taking','is taking'], ans:2, exp:'✅ "Right now" + רבים → are taking!' },
];

const LEVELS = [
  { name:'🌸 Planet Easy', desc:'שאלות קלות על Present Simple ו-Progressive — מושלם לחימום!', filter: q=>q.hard===0 },
  { name:'🪐 Planet Medium', desc:'רמה בינונית — תשתמש בהקשר כדי להחליט!', filter: q=>q.hard===1 },
  { name:'🌍 Planet Hard', desc:'שאלות מאתגרות עם הסחות דעת — רק לאמיצים!', filter: q=>q.hard===2 },
  { name:'⭐ Galaxy Mix', desc:'מיקס של כל הרמות — האתגר הגדול ביותר!', filter: ()=>true },
];

let selLevel=-1, questions=[], cur=0, score=0, lives=3, streak=0, answered=false;
const LETTERS=['A','B','C','D'];

function selectLevel(i){
  selLevel=i;
  document.querySelectorAll('.planet').forEach((p,j)=>p.classList.toggle('selected',j===i));
  document.getElementById('level-desc').textContent=LEVELS[i].desc;
  document.getElementById('start-btn').disabled=false;
}

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function startGame(){
  const pool=ALL_Q.filter(LEVELS[selLevel].filter);
  questions=shuffle(pool).slice(0,Math.min(10,pool.length));
  cur=0; score=0; lives=3; streak=0;
  showScreen('screen-game');
  renderHearts();
  loadQ();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderHearts(){
  const h=document.getElementById('hearts'); h.innerHTML='';
  for(let i=0;i<3;i++){
    const s=document.createElement('span');
    s.className='heart'+(i>=lives?' lost':'');
    s.textContent='❤️'; h.appendChild(s);
  }
}

function loadQ(){
  answered=false;
  const q=questions[cur];
  document.getElementById('hud-level').textContent=LEVELS[selLevel].name;
  document.getElementById('hud-score').textContent=`⭐ ${score} pts`;
  const pct=(cur/questions.length)*100;
  document.getElementById('track-fill').style.width=pct+'%';
  const card=document.getElementById('q-card');
  card.className='q-card type-'+q.type;
  document.getElementById('q-type-tag').textContent=q.type==='ps'?'🟢 Present Simple':'🟠 Present Progressive';
  document.getElementById('q-en').textContent=q.en;
  document.getElementById('q-he').textContent='🇮🇱 '+q.he;
  const opts=document.getElementById('opts'); opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="opt-letter">${LETTERS[i]}</span>${o}`;
    b.onclick=()=>pick(i);
    opts.appendChild(b);
  });
  document.getElementById('fb').className='fb-box';
  document.getElementById('fb').textContent='';
  document.getElementById('next-btn').className='next-btn';
}

function pick(i){
  if(answered) return;
  answered=true;
  const q=questions[cur];
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  btns[q.ans].classList.add('correct');
  const fb=document.getElementById('fb');
  if(i===q.ans){
    streak++;
    score+=streak>=3?20:10;
    document.getElementById('hud-score').textContent=`⭐ ${score} pts`;
    if(streak===3||streak===5) showStreak();
    spawnConfetti(btns[i]);
    fb.textContent=q.exp;
    fb.className='fb-box ok show';
  } else {
    streak=0;
    lives=Math.max(0,lives-1);
    renderHearts();
    btns[i].classList.add('wrong');
    fb.textContent='💡 התשובה הנכונה: '+q.opts[q.ans]+' — '+q.exp.replace(/^✅\s*/,'');
    fb.className='fb-box err show';
  }
  const nb=document.getElementById('next-btn');
  nb.textContent=cur<questions.length-1?'שאלה הבאה →':'🏁 לתוצאות!';
  nb.className='next-btn show';
  if(lives===0) nb.textContent='💔 סיום — ראה ציון';
}

function showStreak(){
  const d=document.createElement('div');
  d.className='streak-badge';
  d.textContent=streak===3?'🔥 רצף של 3!':'⚡ רצף של 5!';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1500);
}

function spawnConfetti(btn){
  const r=btn.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const colors=['#6d56d8','#e94560','#0a9e7a','#e08a00','#c4b5fd'];
  for(let i=0;i<14;i++){
    const d=document.createElement('div');
    d.className='burst';
    d.style.cssText=`left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};--tx:${(Math.random()-0.5)*110}px;--ty:${(Math.random()-0.5)*110}px;`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),900);
  }
}

document.getElementById('next-btn').onclick=()=>{
  cur++;
  if(cur<questions.length&&lives>0) loadQ();
  else showEnd();
};

function showEnd(){
  document.getElementById('track-fill').style.width='100%';
  const pct=Math.min(Math.round(score/(questions.length*10)*100),100);
  let planet='🏆',title='כל הכבוד!',stars='⭐⭐⭐⭐⭐',msg='אתה אלוף/ת הגלקסיה! דקדוק מושלם!';
  if(pct>=90){planet='🌟';title='גלקטי!';stars='🌟🌟🌟🌟🌟';}
  else if(pct>=70){planet='🚀';title='מדהים!';stars='⭐⭐⭐⭐';msg='כמעט מושלם — עוד קצת תרגול!';}
  else if(pct>=50){planet='🌍';title='לא רע!';stars='⭐⭐⭐';msg='תרגול עושה מושלם — נסה שוב!';}
  else{planet='💪';title='המשך לנסות!';stars='⭐⭐';msg='Present Simple ו-Progressive — עוד מעט תהיה שם!';}
  document.getElementById('end-planet').textContent=planet;
  document.getElementById('end-title').textContent=title;
  document.getElementById('end-stars').textContent=stars;
  document.getElementById('score-ring').style.setProperty('--pct',pct+'%');
  document.getElementById('score-num').textContent=score+'pts';
  document.getElementById('end-msg').textContent=msg;
  showScreen('screen-end');
}

function goIntro(){ showScreen('screen-intro'); }

function shareResult(){
  const msg=`🚀 Grammar Galaxy — קיבלתי ${score} נקודות! Present Simple & Progressive כיתה ה׳`;
  if(navigator.share) navigator.share({title:'Grammar Galaxy',text:msg});
  else { navigator.clipboard&&navigator.clipboard.writeText(msg); alert('הציון הועתק! 📋'); }
}
</script>
</body>
